<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM_OVERRIDE_</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #00ff00; /* すべて鮮やかなグリーンに統一 */
    font-family: 'Courier New', Courier, monospace;
    overflow-x: hidden;
    overflow-y: auto;
    /* スクロールを滑らかにする魔法のプロパティ */
    scroll-behavior: smooth; 
}

#notice {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #050505;
    border-bottom: 1px solid #00ff00;
    padding: 8px;
    text-align: center;
    z-index: 9999;
    font-size: 13px;
    letter-spacing: 2px;
}

#console {
    margin-top: 50px;
    padding: 15px;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 14px;
    line-height: 1.6;
}

/* クラスによる色分けを廃止し、すべて同色に */
.meta, .payload, .trace {
    color: #00ff00;
}
</style>
</head>
<body>

<div id="notice">
    [ SAFE_MODE: JOKE RUNTIME // NO DATA IS BEING TRANSMITTED ]
</div>

<div id="console"></div>

<script>
const consoleElem = document.getElementById("console");

// より「ガチ」っぽいハッキング・システムログ
const hackerLogs = [
    "UNLINKING CORRUPTED INODE FROM ROOT DIRECTORY...",
    "EXTRACTING MEMORY CORES VIA EXPLOIT-CVE-2026-9912...",
    "INJECTING MEMORY POINTER INTO OVERFLOW BUFFER...",
    "ASSEMBLING X86_64 SHELLCODE PAYLOAD...",
    "BYPASSING KERNEL MEMORY PROTECTION (SMEP/SMAP)...",
    "HOOKING SYSTEM CALL TABLE AT ENTRY 0x00FF3A...",
    "INITIATING PORT SCAN ON SUBNET 192.168.1.0/24...",
    "PACKET INTERCEPTION ACTIVE: SNIFFING ETH0...",
    "DECRYPTING SHA-256 PASSWORD HASHES...",
    "STAGER PAYLOAD EXECUTED SUCCESSFULLY ON TARGET NODE...",
    "ESTABLISHING REVERSE-SHELL BACKDOOR OVER PORT 4444...",
    "CORRUPTING AUDIT_LOG.GZ TO ERASE FORENSIC TRACKS...",
    "DECOMPILING ENCRYPTED BINARY MATRIX...",
    "ALERT: INTRUSION DETECTION SYSTEM BYPASSED...",
    "HIJACKING ROUTING TABLE VIA ARP SPOOFING...",
    "DUMPING SAM DATABASE FROM MEMORY SPACE...",
    "ZOMBIE NETWORKS SYNCHRONIZED. AWAITING COMMAND...",
    "QUANTUM ENCRYPTION KEY DECODED: 99.8% ACCURACY..."
];

function getHex(len) {
    const chars = "0123456789ABCDEF";
    let res = "";
    for(let i=0; i<len; i++) {
        res += chars[Math.floor(Math.random() * chars.length)];
    }
    return res;
}

function getFakeIP() {
    return `${Math.floor(Math.random()*223)+1}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
}

function getProgressBar() {
    const percent = Math.floor(Math.random() * 100);
    const bars = "====================".slice(0, Math.floor(percent / 5));
    const spaces = "....................".slice(0, 20 - Math.floor(percent / 5));
    return `[${bars}${spaces}] ${percent}%`;
}

function appendLog() {
    let logText = "";
    const rand = Math.random();

    if (rand < 0.6) {
        logText = `[SYS_TRC_0x${getHex(4)}] ${hackerLogs[Math.floor(Math.random() * hackerLogs.length)]}`;
    } else if (rand < 0.75) {
        logText = `[STATUS_OK] REMOTE SYSTEM INTEGRITY COMPROMISED`;
    } else if (rand < 0.85) {
        logText = `[CRITICAL_WARN] BUFFER OVERFLOW IN TRACE DIRECTORY`;
    } else if (rand < 0.93) {
        logText = `[NET_SCAN] PARSING PACKETS FROM TARGET IP -> ${getFakeIP()}:${Math.floor(Math.random()*65535)}`;
    } else {
        logText = `[DECRYPT] ${getProgressBar()} COMPILING CIPHER...`;
    }

    const line = document.createElement("div");
    line.textContent = logText;
    consoleElem.appendChild(line);

    // ログが溜まりすぎたら古いものを消す（メモリ対策）
    if (consoleElem.childNodes.length > 200) {
        consoleElem.removeChild(consoleElem.firstChild);
    }

    // ログが追加された瞬間に、滑らかに最下部へスクロールさせる
    window.scrollTo(0, document.body.scrollHeight);
}

// ログ出力のループ（ランダムなウェイトでリアル感を出す）
function loop() {
    appendLog();
    // 爆速で流れるときと、ちょっと引っかかる（処理中っぽい）ときの緩急をつける
    const nextTick = Math.random() < 0.08 ? Math.floor(Math.random() * 500) + 150 : Math.floor(Math.random() * 30) + 10;
    setTimeout(loop, nextTick);
}

// タイトルもそれっぽく
setInterval(() => {
    document.title = `OVERRIDE_RUNNING_0x${getHex(4)}`;
}, 600);

// 起動
loop();
</script>

</body>
</html>
