<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    color:#00ff00;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#notice{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#111;
    border-bottom:1px solid #00ff00;
    padding:8px;
    text-align:center;
    z-index:9999;
    font-size:14px;
}

#output{
    margin-top:40px;
    padding:10px;
    white-space:pre-wrap;
    word-break:break-all;
}

.blink{
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>
<body>



<div id="output"></div>

<script>

const output = document.getElementById("output");

const messages = [

"INITIALIZING...",
"BOOTSTRAP COMPLETE",

"COLLECTING BROWSER METADATA",
"ENUMERATING FEATURES",

"ANALYZING RENDER ENGINE",
"CALCULATING RANDOM NUMBERS",
"CHECKING KEYBOARD EXISTENCE",
"CONFIRMING HUMAN PRESENCE",
"SCANNING COFFEE LEVEL",
"COUNTING PIXELS",
"MEASURING ABSOLUTE CONFUSION",
"VERIFYING EXISTENCE OF USER",
"SEARCHING FOR INTELLIGENCE",
"INTELLIGENCE NOT FOUND",
"RETRYING...",
"INTELLIGENCE MAY EXIST",
"CHECKING CAT OWNERSHIP",
"CALCULATING LUCK STAT",
"GENERATING MEANINGLESS HASH",
"HASH ACCEPTED",
"PROCESSING...",
"PROCESSING...",
"PROCESSING...",
"ANALYZING WALLPAPER QUALITY",
"MEASURING PROCRASTINATION INDEX",
"SCANNING FOR MEMES",
"MEMES DETECTED",
"DANGEROUS AMOUNT OF MEMES",
"CALCULATING CHAOS LEVEL",
"LOCATING NEAREST POTATO",
"CHECKING FOR DRAGON PRESENCE",
"NO DRAGON DETECTED",
"VERIFYING THAT 1+1=2",
"SUCCESS",
"ANALYZING WIFI VIBES",
"CHECKING REALITY CONSISTENCY",
"REALITY STATUS: QUESTIONABLE",
"GENERATING RANDOM REPORT",
"REPORT GENERATED",
"REPORT LOST",
"SEARCHING FOR REPORT",
"REPORT STILL LOST",
"CALCULATING PROBABILITY OF EXISTENCE",
"EXISTENCE CONFIDENCE: 61%",
"ANALYZING KEYBOARD ABUSE",
"CHECKING CAPS LOCK STATUS",
"MEASURING GAMER ENERGY",
"SCANNING FOR HOMEWORK",
"HOMEWORK DETECTED",
"WARNING: HOMEWORK DETECTED",
"CRITICAL HOMEWORK LEVELS",
"ATTEMPTING HOMEWORK DELETION",
"ACCESS DENIED",
"MEASURING BOREDOM",
"BOREDOM LEVEL: MAXIMUM",
"GENERATING USELESS STATISTICS",
"USELESS STATISTICS GENERATED",
"COUNTING ATOMS",
"TOO MANY ATOMS",
"CHECKING WHETHER USER IS HUMAN",
"LIKELY HUMAN",
"PROBABLY HUMAN",

"RUNNING ADVANCED ANALYSIS",
"ADVANCED ANALYSIS COMPLETE",
"ADVANCED ANALYSIS WAS POINTLESS",
"FINALIZING REPORT"

];

function randomHex(len){
    const chars="0123456789ABCDEF";
    let s="";
    for(let i=0;i<len;i++){
        s+=chars[Math.floor(Math.random()*chars.length)];
    }
    return s;
}

function randomLine(){

    let text =
        "[" + randomHex(8) + "] " +
        messages[Math.floor(Math.random()*messages.length)];

    output.innerHTML += text + "\n";

    if(Math.random() < 0.25){
        output.innerHTML +=
        "HASH: " + randomHex(32) + "\n";
    }

    if(Math.random() < 0.15){
        output.innerHTML +=
        "CONFIDENCE: " +
        Math.floor(Math.random()*100) +
        "%\n";
    }

    if(output.innerHTML.length > 100000){
        output.innerHTML =
        output.innerHTML.slice(30000);
    }
}

setInterval(randomLine,5);

setInterval(()=>{
    window.scrollTo(
        0,
        document.body.scrollHeight
    );
},1);

function printInfo(){

    output.innerHTML += "\n";
    output.innerHTML += "=== BROWSER INFO ===\n";

    output.innerHTML +=
    "USER AGENT: " +
    navigator.userAgent + "\n";

    output.innerHTML +=
    "LANGUAGE: " +
    navigator.language + "\n";

    output.innerHTML +=
    "PLATFORM: " +
    navigator.platform + "\n";

    output.innerHTML +=
    "SCREEN: " +
    screen.width +
    "x" +
    screen.height +
    "\n";

    output.innerHTML +=
    "TIMEZONE: " +
    Intl.DateTimeFormat()
    .resolvedOptions()
    .timeZone +
    "\n";

    output.innerHTML += "\n";
}

printInfo();

setInterval(()=>{
    document.title =
    randomHex(6);
},500);

</script>

</body>
</html>
