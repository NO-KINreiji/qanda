<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    color:#00ff00;
    font-family:Consolas,monospace;
    overflow-x:hidden;
}

#container{
    padding:20px;
    white-space:pre-wrap;
    word-break:break-all;
    line-height:1.5;
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>
<body>

<div id="container">
<span class="blink">█</span>
</div>

<script>

const out = document.getElementById("container");

function write(text){
    out.innerHTML += text + "\n";
}

write("Initializing...");
write("");

const data = {
    "User Agent": navigator.userAgent,
    "Platform": navigator.platform,
    "Language": navigator.language,
    "Languages": navigator.languages.join(", "),
    "Cookies Enabled": navigator.cookieEnabled,
    "Online": navigator.onLine,
    "Hardware Concurrency": navigator.hardwareConcurrency,
    "Device Memory (GB)": navigator.deviceMemory || "Unknown",
    "Max Touch Points": navigator.maxTouchPoints,
    "Timezone": Intl.DateTimeFormat().resolvedOptions().timeZone,
    "Screen Width": screen.width,
    "Screen Height": screen.height,
    "Available Width": screen.availWidth,
    "Available Height": screen.availHeight,
    "Color Depth": screen.colorDepth,
    "Pixel Depth": screen.pixelDepth,
    "Inner Width": window.innerWidth,
    "Inner Height": window.innerHeight,
    "Outer Width": window.outerWidth,
    "Outer Height": window.outerHeight,
    "Referrer": document.referrer || "(none)",
    "URL": location.href
};

for(const key in data){
    write(key + ": " + data[key]);
}

write("");

navigator.storage?.estimate?.().then(storage=>{
    write("Storage Usage: " + storage.usage + " bytes");
    write("Storage Quota: " + storage.quota + " bytes");
});

if(navigator.connection){
    write("Connection Type: " + navigator.connection.effectiveType);
    write("Downlink: " + navigator.connection.downlink + " Mbps");
    write("RTT: " + navigator.connection.rtt + " ms");
}

if(navigator.getBattery){
    navigator.getBattery().then(battery=>{
        write("");
        write("Battery Level: " + Math.round(battery.level*100) + "%");
        write("Charging: " + battery.charging);
    });
}

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(ip=>{
    write("");
    write("Public IP: " + ip.ip);
});

if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
        pos=>{
            write("");
            write("Latitude: " + pos.coords.latitude);
            write("Longitude: " + pos.coords.longitude);
            write("Accuracy: " + pos.coords.accuracy + "m");
        },
        ()=>{
            write("");
            write("Location: ACCESS DENIED");
        }
    );
}

write("");
write("Scanning browser capabilities...");
write("");

const features = [
    "bluetooth",
    "clipboard",
    "credentials",
    "mediaDevices",
    "serviceWorker",
    "usb",
    "wakeLock",
    "share"
];

features.forEach(f=>{
    write(
        f + ": " +
        (navigator[f] ? "AVAILABLE" : "UNAVAILABLE")
    );
});

setInterval(()=>{
    document.title =
        Math.random().toString(36).substring(2,8).toUpperCase();
},500);

</script>

</body>
</html>
